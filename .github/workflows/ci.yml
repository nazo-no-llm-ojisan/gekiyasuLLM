name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            packages/schema/package-lock.json
            packages/proxy/package-lock.json

      - name: Install schema
        working-directory: packages/schema
        run: npm ci

      - name: Build schema
        working-directory: packages/schema
        run: npm run build

      - name: Test schema
        working-directory: packages/schema
        run: npm test

      - name: Install proxy
        working-directory: packages/proxy
        run: npm ci

      - name: Typecheck proxy
        working-directory: packages/proxy
        run: npm run typecheck

      - name: Test proxy
        working-directory: packages/proxy
        run: npm test
